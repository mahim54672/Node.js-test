<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Funny TV - Responsive News</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body {font-family:"Noto Sans Bengali", Arial, sans-serif; background:#0f0f0f; color:#fff;}

header {background:#000; padding:20px 25px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:1000;}
.logo {display:flex; align-items:center;}
.logo img {height:100px; width:auto; margin-right:15px;}
.logo span{font-size:32px; font-weight:bold; color:#e63946;}
nav {display:flex; align-items:center;}
nav a {color:#fff; margin:0 12px; text-decoration:none; font-size:16px; font-weight:bold;}
nav a:hover{ color:#e63946; }
.menu-toggle {display:none; font-size:26px; cursor:pointer;}
@media (max-width:768px){
    nav {display:none; flex-direction:column; background:#111; position:absolute; top:120px; right:0; width:220px; padding:12px;}
    nav a {margin:12px 0;}
    nav.active {display:flex;}
    .menu-toggle {display:block; color:#fff;}
    .logo img {height:80px;}
    .logo span {font-size:26px;}
}

.carousel {position:relative; width:100%; max-height:400px; overflow:hidden; margin-top:15px;}
.carousel-slide {display:none; position:relative; width:100%; height:400px;}
.carousel-slide img {width:100%; height:100%; object-fit:cover;}
.carousel-slide .caption {position:absolute; bottom:20px; left:20px; font-size:22px; background:rgba(0,0,0,0.5); padding:12px 18px; border-radius:8px;}

.section {padding:25px;}
.section h2 {font-size:20px; margin-bottom:15px; border-left:6px solid #e63946; padding-left:12px;}

.grid {display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:18px;}
.card {background:#1a1a1a; border-radius:8px; overflow:hidden; box-shadow:0 4px 10px rgba(0,0,0,0.5); transition:.3s; cursor:pointer;}
.card:hover {transform:translateY(-8px);}
.card img {width:100%; height:180px; object-fit:cover;}
.card h3 {padding:12px; font-size:17px; line-height:1.4;}

#singleNews {display:none; padding:25px;}
#singleNews h1 {margin-bottom:15px;}
#singleNews img {max-width:100%; border-radius:8px; margin-bottom:15px;}
#singleNews p {line-height:1.6; font-size:16px;}

footer {background:#000; text-align:center; padding:25px; margin-top:25px; color:#bbb;}
footer a {color:#e63946; margin:0 10px; text-decoration:none;}
footer a:hover{text-decoration:underline;}
</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="FunnyTV Logo">
    <span>funnytv</span>
  </div>
  <div class="menu-toggle" onclick="document.querySelector('nav').classList.toggle('active')">☰</div>
  <nav>
    <a href="#" onclick="showHome()">হোম</a>
  </nav>
</header>

<div class="carousel" id="carousel"></div>

<div id="homeContent">
<section class="section">
  <h2>বাংলাদেশ</h2>
  <div id="bangladeshGrid" class="grid"></div>
</section>

<section class="section">
  <h2>বিশ্ব</h2>
  <div id="worldGrid" class="grid"></div>
</section>
</div>

<div id="singleNews"></div>

<footer>
  <p>© 2025 FunnyTV | Contact: hello@example.com</p>
  <p>
    <a href="#">Facebook</a> |
    <a href="#">YouTube</a> |
    <a href="#">TikTok</a>
  </p>
</footer>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC8iKwJ06g29H8qv1xDD1mKDN5uIIKiPaY",
  authDomain: "istiak-ahmmed-enan.firebaseapp.com",
  databaseURL: "https://istiak-ahmmed-enan-default-rtdb.firebaseio.com",
  projectId: "istiak-ahmmed-enan",
  storageBucket: "istiak-ahmmed-enan.firebasestorage.app",
  messagingSenderId: "969564579404",
  appId: "1:969564579404:web:c0abe00858e71d5c18b6e9",
  measurementId: "G-DHT284WQHQ"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Load news
function loadNews(section, containerId) {
  const container = document.getElementById(containerId);
  db.ref(section).orderByChild('timestamp').limitToLast(10).on('value', snapshot => {
    container.innerHTML = '';
    snapshot.forEach(child => {
      const data = child.val();
      const slug = encodeURIComponent(data.title.replace(/\s+/g,'-'));
      const card = document.createElement('div');
      card.className = 'card';
      card.onclick = ()=>showNews(section, slug);
      card.innerHTML = `<img src="${data.imageUrl}" alt="">
                        <h3>${data.title}</h3>`;
      container.prepend(card);
    });
  });
}

// Load carousel
function loadCarousel() {
  const carousel = document.getElementById('carousel');
  db.ref('carousel').orderByChild('timestamp').on('value', snapshot => {
    carousel.innerHTML = '';
    snapshot.forEach(child => {
      const data = child.val();
      const slide = document.createElement('div');
      slide.className = 'carousel-slide';
      slide.innerHTML = `<img src="${data.imageUrl}" alt="">
                         <div class="caption">${data.title}</div>`;
      carousel.appendChild(slide);
    });
    startCarousel();
  });
}

let currentSlide=0;
function startCarousel(){
  const slides=document.querySelectorAll('.carousel-slide');
  if(slides.length===0)return;
  slides.forEach(s=>s.style.display='none');
  slides[currentSlide].style.display='block';
  setInterval(()=>{
    slides[currentSlide].style.display='none';
    currentSlide=(currentSlide+1)%slides.length;
    slides[currentSlide].style.display='block';
  },4000);
}

// Show single news
function showNews(section, slug){
  db.ref(section).orderByChild('timestamp').once('value', snapshot=>{
    let found=false;
    snapshot.forEach(child=>{
      const data = child.val();
      const newsSlug = encodeURIComponent(data.title.replace(/\s+/g,'-'));
      if(newsSlug===slug){
        found=true;
        document.getElementById('homeContent').style.display='none';
        const single = document.getElementById('singleNews');
        single.style.display='block';
        single.innerHTML = `<a href="#" onclick="showHome()">← Back to Home</a>
                            <h1>${data.title}</h1>
                            <img src="${data.imageUrl}" alt="">
                            <p>${data.content || 'No content available.'}</p>`;
        history.pushState({slug:slug}, data.title, '?news='+slug);
      }
    });
    if(!found)alert('News not found');
  });
}

function showHome(){
  document.getElementById('homeContent').style.display='block';
  document.getElementById('singleNews').style.display='none';
  history.pushState({}, '', location.pathname);
}

// Handle back/forward browser
window.onpopstate = function(event){
  if(event.state && event.state.slug){
    showNews('bangladesh', event.state.slug); // default section
  } else {
    showHome();
  }
}

// Initialize
loadNews('bangladesh','bangladeshGrid');
loadNews('world','worldGrid');
loadCarousel();
</script>

</body>
</html>
